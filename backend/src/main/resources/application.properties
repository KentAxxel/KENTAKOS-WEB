spring.application.name=backend

# Configuración de Conexión a la Base de Datos (MariaDB)

# Asegúrate de cambiar "kentakitos_db", "root" y la contraseña si son diferentes en tu computadora.
#spring.datasource.url=jdbc:mariadb://localhost:3306/shop_kentakos
spring.datasource.url=jdbc:mariadb://localhost:3306/kentakos
#spring.datasource.username=shop_kentakos
#spring.datasource.password=.kentakitos123

spring.datasource.username=root
spring.datasource.password=

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

#server.port=2920
server.port=8080

# Configuración de Hibernate para crear/actualizar las tablas (Ejecutar el SQL automáticamente)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Deshabilitar seguridad por defecto momentáneamente para pruebas
spring.security.user.name=admin
spring.security.user.password=admin
